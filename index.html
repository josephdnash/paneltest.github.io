<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xbox Touch Panel</title>
    <style>
        body {
            background-color: #0f172a; color: #e2e8f0; margin: 0; padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh; box-sizing: border-box;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .status { font-size: 14px; font-weight: bold; color: #f59e0b; text-transform: uppercase; letter-spacing: 1px; }
        .telemetry-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 600px; margin-bottom: 40px;
        }
        .instrument {
            background: #1e293b; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #334155;
        }
        .instrument-label { font-size: 14px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        .instrument-value { font-size: 48px; font-weight: 700; color: #38bdf8; font-variant-numeric: tabular-nums; }
        .instrument-unit { font-size: 16px; color: #64748b; }
        .controls { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Button Styles */
        .btn {
            background: #3b82f6; color: white; border: none; padding: 20px; font-size: 20px;
            font-weight: bold; border-radius: 12px; width: 100%; cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: translateY(2px); }
        .btn-lights { background: #eab308; color: #1c1917; }
        .btn-pause { background: #ef4444; color: white; border: 2px solid #b91c1c; }
    </style>
</head>
<body>

    <div class="header">
        <h1>External Touch Panel</h1>
        <div id="connection-status" class="status">Connecting to Cloud...</div>
    </div>

    <div class="telemetry-grid">
        <div class="instrument">
            <div class="instrument-label">Airspeed</div>
            <div class="instrument-value" id="val-airspeed">---</div>
            <div class="instrument-unit">KNOTS</div>
        </div>
        <div class="instrument">
            <div class="instrument-label">Altitude</div>
            <div class="instrument-value" id="val-altitude">---</div>
            <div class="instrument-unit">FEET</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-pause" onclick="sendCommand('PAUSE_SIM')">ACTIVE PAUSE SIMULATOR</button>
        <button class="btn" onclick="toggleGear()">TOGGLE LANDING GEAR</button>
        <button class="btn btn-lights" onclick="sendCommand('LIGHTS_TOGGLE')">TOGGLE NAV/STROBE LIGHTS</button>
    </div>

    <script>
        const statusDiv = document.getElementById('connection-status');
        const altDiv = document.getElementById('val-altitude');
        const spdDiv = document.getElementById('val-airspeed');
        let ws;
        let gearIsDown = true; 

        function connect() {
            ws = new WebSocket('wss://msfs-relay.onrender.com');

            ws.onopen = () => {
                statusDiv.innerText = 'Connected to MSFS';
                statusDiv.style.color = '#10b981';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.altitude !== undefined) altDiv.innerText = Math.round(data.altitude);
                    if (data.airspeed !== undefined) spdDiv.innerText = Math.round(data.airspeed);
                } catch (e) {}
            };

            ws.onclose = () => {
                statusDiv.innerText = 'Disconnected - Retrying...';
                statusDiv.style.color = '#ef4444';
                setTimeout(connect, 3000);
            };
        }

        function sendCommand(typeCode) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: typeCode }));
            }
        }

        function toggleGear() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                gearIsDown = !gearIsDown;
                ws.send(JSON.stringify({ type: "GEAR_SET", value: gearIsDown ? 1 : 0 }));
            }
        }

        connect();
    </script>
</body>
</html>
