<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MSFS Panel Builder</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-base: #09090b; --bg-panel: #18181b; --border-panel: #27272a;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --accent-blue: #0ea5e9; --accent-green: #10b981;
            --accent-red: #ef4444; --accent-yellow: #f59e0b;
            --accent-purple: #a855f7;
        }

        body {
            background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif;
            margin: 0; padding: 24px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
            user-select: none; -webkit-user-select: none; overflow: hidden;
        }

        /* --- THE LOCK SCREEN --- */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .lock-box {
            background: var(--bg-panel); padding: 40px; border-radius: 16px; border: 1px solid var(--border-panel);
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .lock-box input {
            background: #000; color: var(--accent-blue); border: 2px solid #333; font-size: 32px; font-weight: 900;
            text-align: center; padding: 16px; width: 100%; box-sizing: border-box; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 4px; margin-bottom: 24px; outline: none; font-family: 'Roboto Mono', monospace;
        }
        .lock-box input:focus { border-color: var(--accent-blue); }
        .lock-box button {
            background: var(--accent-blue); color: white; border: none; padding: 16px; width: 100%;
            font-size: 18px; font-weight: 800; border-radius: 12px; cursor: pointer; transition: 0.2s;
        }
        .lock-box button:hover { background: #0284c7; }

        /* APP UI */
        #app-container { display: none; flex-direction: column; height: 100%; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-panel); }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-muted); text-transform: uppercase; }

        .controls-row { display: flex; gap: 12px; align-items: center; }
        
        .mode-toggle {
            background: #27272a; color: white; border: none; padding: 8px 16px; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .mode-toggle.edit-active { background: var(--accent-blue); }
        .mode-toggle.profile-btn { background: #18181b; border: 1px solid #333; }
        .mode-toggle.profile-btn:hover { background: #27272a; }

        .status-indicator { width: 10px; height: 10px; border-radius: 50%; background-color: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); display: inline-block; margin-right: 8px;}
        .status-indicator.connected { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .status-indicator.disconnected { background-color: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }

        /* THE GRID */
        #builder-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 10px; flex-grow: 1; background: #000; padding: 16px; border-radius: 16px; 
            border: 2px solid var(--border-panel); box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
        }

        .grid-cell { background-color: #111; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.1s; position: relative; padding: 6px; }
        body.edit-mode .grid-cell { border: 2px dashed #333; cursor: pointer; }
        body.edit-mode .grid-cell:hover { border-color: var(--accent-blue); background-color: #1a1a2e; }
        body.edit-mode .grid-cell.filled { border: 2px solid var(--accent-blue); }
        
        .grid-cell.dragging { opacity: 0.4; transform: scale(0.95); }
        .grid-cell.drag-over { border: 2px dashed var(--accent-green) !important; background-color: rgba(16, 185, 129, 0.1) !important; }
        
        body.fly-mode .grid-cell { border: 1px solid #333; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: border-color 0.1s, background-color 0.1s;}
        body.fly-mode .grid-cell.empty { opacity: 0; pointer-events: none; }
        body.fly-mode .grid-cell.type-button:active, body.fly-mode .grid-cell.type-nav:active { transform: scale(0.92); box-shadow: 0 0 2px rgba(0,0,0,0.8); border-color: var(--accent-blue); }
        
        body.fly-mode .grid-cell.type-button.active { border-color: var(--accent-green); background-color: rgba(16, 185, 129, 0.1); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        body.fly-mode .grid-cell.type-button.active .cell-icon { filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.8)); }

        body.fly-mode .grid-cell.type-nav { border-color: var(--accent-purple); background: linear-gradient(180deg, #18181b 0%, #111 100%); }
        body.fly-mode .grid-cell.type-gauge { background-color: var(--bg-panel); border-top: 4px solid var(--accent-blue); justify-content: space-evenly; }
        body.fly-mode .grid-cell.type-rotary { background-color: var(--bg-panel); border-top: 4px solid var(--accent-yellow); justify-content: space-evenly; }

        .cell-icon { font-size: 24px; margin-bottom: 2px; transition: filter 0.2s;}
        .cell-title { font-size: 10px; font-weight: bold; text-align: center; padding: 0 4px; color: var(--text-muted); text-transform: uppercase;}
        .cell-value { font-family: 'Roboto Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text-main); display: none;}
        body.fly-mode .grid-cell.type-gauge .cell-value { display: block; }
        body.fly-mode .grid-cell.type-gauge .cell-icon { display: none; }

        .rotary-container { display: none; width: 100%; justify-content: space-between; align-items: center; background: #000; border-radius: 8px; padding: 2px 4px; box-sizing: border-box; margin-top: 4px; }
        body.fly-mode .grid-cell.type-rotary .rotary-container { display: flex; }
        body.fly-mode .grid-cell.type-rotary .cell-icon { display: none; }
        body.fly-mode .grid-cell.type-rotary .cell-value { display: block; font-size: 16px; color: var(--accent-yellow); margin: 0;}
        .rotary-btn { background: #333; color: white; border: none; border-radius: 6px; width: 28px; height: 28px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .rotary-btn:active { background: var(--accent-yellow); transform: scale(0.9); }

        .delete-btn { position: absolute; top: -8px; right: -8px; background: var(--accent-red); color: white; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid #000; z-index: 10; }
        body.edit-mode .grid-cell.filled .delete-btn { display: flex; }

        /* --- MODALS --- */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg-panel); border-radius: 16px; width: 95%; max-width: 900px; height: 80vh; border: 1px solid var(--border-panel); display: flex; flex-direction: row; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-content.small { width: 90%; max-width: 400px; height: auto; flex-direction: column; padding: 24px; box-sizing: border-box; }
        
        .modal-sidebar { width: 30%; background: #09090b; border-right: 1px solid var(--border-panel); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .cat-btn { background: transparent; color: var(--text-muted); border: none; padding: 12px 16px; border-radius: 8px; text-align: left; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; margin-bottom: 4px; }
        .cat-btn:hover { background: #27272a; color: white; }
        .cat-btn.active { background: var(--accent-blue); color: white; }
        .cancel-btn { margin-top: auto; width: 100%; padding: 14px; background: #27272a; color: white; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .cancel-btn:hover { background: var(--accent-red); border-color: var(--accent-red); }

        .modal-main { width: 70%; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #modal-search { width: 100%; background: #000; border: 1px solid var(--border-panel); color: white; padding: 16px; border-radius: 8px; font-size: 16px; margin-bottom: 16px; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
        #modal-search:focus { outline: none; border-color: var(--accent-blue); }
        
        .component-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-grow: 1; padding-right: 8px; }
        .component-item { background: #27272a; padding: 12px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 16px; color: white; font-weight: bold; border: 1px solid transparent; transition: 0.1s; }
        .component-item:hover { background: #3f3f46; border-color: #52525b; }
        .component-item:active { border-color: var(--accent-blue); transform: scale(0.98); }
        .component-tag { font-size: 10px; background: #000; padding: 4px 8px; border-radius: 6px; color: var(--text-muted); margin-left: auto; letter-spacing: 0.5px;}

        .profile-item { background: #27272a; padding: 16px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-weight: bold; color: white; border: 2px solid transparent; display: flex; justify-content: space-between; }
        .profile-item.active { border-color: var(--accent-blue); background: rgba(14, 165, 233, 0.1); color: var(--accent-blue); }
        .profile-item:hover:not(.active) { background: #3f3f46; }
        .create-profile-btn { background: var(--accent-green); color: black; font-weight: bold; border: none; padding: 14px; border-radius: 8px; cursor: pointer; margin-top: 16px; font-size: 14px; }
        
        /* THE UX FIX: Updated Button Text */
        .unpair-btn { background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 8px; width: 100%;}
        .unpair-btn:hover { background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="edit-mode">

    <div id="lock-screen">
        <div class="lock-box">
            <h1 style="margin-top: 0; font-size: 28px; color: white;">Link Simulator</h1>
            <p style="color: var(--text-muted); line-height: 1.5; margin-bottom: 24px;">Enter the 6-digit Pairing ID shown on the virtual panel inside Microsoft Flight Simulator.</p>
            <input type="text" id="pin-input" maxlength="6" placeholder="A7X9BQ">
            <button onclick="attemptPairing()">CONNECT DASHBOARD</button>
        </div>
    </div>

    <div id="app-container">
        <div class="header">
            <div>
                <h1 id="breadcrumb">HOME</h1>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
                    <div id="status-dot" class="status-indicator"></div>
                    <span id="connection-status-text">CONNECTING</span>
                </div>
            </div>
            <div class="controls-row">
                <button class="mode-toggle profile-btn" onclick="openProfileModal()">🛩️ <span id="ui-current-profile">Default</span></button>
                <button id="btn-mode" class="mode-toggle edit-active" onclick="toggleMode()">✏️ EDIT MODE</button>
            </div>
        </div>

        <div id="builder-grid"></div>
    </div>

    <div id="profile-modal" class="overlay">
        <div class="modal-content small">
            <h2 style="margin-top: 0; color: white;">Layout Profiles</h2>
            <div id="profile-list" style="max-height: 300px; overflow-y: auto;"></div>
            <button class="create-profile-btn" onclick="createNewProfile()">+ CREATE NEW LAYOUT</button>
            <button class="unpair-btn" onclick="unpairDevice()">UNPAIR THIS DEVICE</button>
            <button class="cancel-btn" style="margin-top: 8px;" onclick="closeProfileModal()">Close</button>
        </div>
    </div>

    <div id="component-modal" class="overlay">
        <div class="modal-content">
            <div class="modal-sidebar">
                <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 18px; color: white;">Library</h2>
                <div id="modal-categories" style="display: flex; flex-direction: column; overflow-y: auto; flex-grow: 1;"></div>
                <button class="cancel-btn" onclick="closeModal()">Close</button>
            </div>
            <div class="modal-main">
                <input type="text" id="modal-search" placeholder="Search for a button or gauge..." oninput="filterModal()">
                <div class="component-list" id="component-list"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. OTP PAIRING BOOTLOADER
        // ==========================================
        let USER_PIN = localStorage.getItem("efb_pairing_pin");

        if (USER_PIN) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            initializeSystem();
        }

        function attemptPairing() {
            const input = document.getElementById('pin-input').value.toUpperCase().trim();
            if (input.length === 6) {
                localStorage.setItem("efb_pairing_pin", input);
                USER_PIN = input;
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                initializeSystem();
            } else {
                alert("Please enter a valid 6-character Pairing ID.");
            }
        }

        function unpairDevice() {
            localStorage.removeItem("efb_pairing_pin");
            location.reload(); 
        }

        // ==========================================
        // 1. FIREBASE & CORE SYSTEM (Wrapped in init)
        // ==========================================

            "gauge_rpm": { category: "Telemetry", name: "Engine RPM", icon: "⏱️", type: "gauge", dataKey: "rpm", unit: "" },
            "gauge_flaps": { category: "Telemetry", name: "Flaps %", icon: "📐", type: "gauge", dataKey: "flaps_pct", unit: "%" },

            "gauge_alt": { category: "Telemetry", name: "Altitude", icon: "⛰️", type: "gauge", dataKey: "altitude", unit: " FT" },
            "gauge_spd": { category: "Telemetry", name: "Airspeed", icon: "💨", type: "gauge", dataKey: "airspeed", unit: " KTS" },
            "gauge_vs": { category: "Telemetry", name: "Vert Speed", icon: "↕️", type: "gauge", dataKey: "vs", unit: " FPM" },
            "gauge_oat": { category: "Telemetry", name: "Outside Temp", icon: "🌡️", type: "gauge", dataKey: "oat", unit: "°C" },
            "rotary_hdg": { category: "Rotaries", name: "AP Heading", icon: "🧭", type: "rotary", dataKey: "ap_hdg", unit: "°", cmdDec: "HEADING_BUG_DEC", cmdInc: "HEADING_BUG_INC" },
            "rotary_alt": { category: "Rotaries", name: "AP Altitude", icon: "↕️", type: "rotary", dataKey: "ap_alt", unit: " FT", cmdDec: "AP_ALT_VAR_DEC", cmdInc: "AP_ALT_VAR_INC" },
            "rotary_vs": { category: "Rotaries", name: "AP Vert Spd", icon: "📈", type: "rotary", dataKey: "ap_vs", unit: " FPM", cmdDec: "AP_VS_VAR_DEC", cmdInc: "AP_VS_VAR_INC" },
            "rotary_ap_spd": { category: "Rotaries", name: "AP Speed", icon: "💨", type: "rotary", dataKey: "ap_spd", unit: " KTS", cmdDec: "AP_SPD_VAR_DEC", cmdInc: "AP_SPD_VAR_INC" },
            "rotary_baro": { category: "Rotaries", name: "Barometer", icon: "☁️", type: "rotary", dataKey: "baro", unit: " hPa", cmdDec: "KOHLSMAN_DEC", cmdInc: "KOHLSMAN_INC" },
            "rotary_obs1": { category: "Rotaries", name: "OBS 1", icon: "🧭", type: "rotary", dataKey: "nav1_obs", unit: "°", cmdDec: "VOR1_OBI_DEC", cmdInc: "VOR1_OBI_INC" },
            "rotary_obs2": { category: "Rotaries", name: "OBS 2", icon: "🧭", type: "rotary", dataKey: "nav2_obs", unit: "°", cmdDec: "VOR2_OBI_DEC", cmdInc: "VOR2_OBI_INC" },
            "rotary_com1_whole": { category: "Radios", name: "COM1 Whole", icon: "📻", type: "rotary", dataKey: "com1_stby", unit: "", decimals: 3, cmdDec: "COM_RADIO_WHOLE_DEC", cmdInc: "COM_RADIO_WHOLE_INC" },
            "rotary_com1_fract": { category: "Radios", name: "COM1 Fract", icon: "📻", type: "rotary", dataKey: "com1_stby", unit: "", decimals: 3, cmdDec: "COM_RADIO_FRACT_DEC", cmdInc: "COM_RADIO_FRACT_INC" },
            "rotary_nav1_whole": { category: "Radios", name: "NAV1 Whole", icon: "📡", type: "rotary", dataKey: "nav1_stby", unit: "", decimals: 2, cmdDec: "NAV1_RADIO_WHOLE_DEC", cmdInc: "NAV1_RADIO_WHOLE_INC" },
            "rotary_nav1_fract": { category: "Radios", name: "NAV1 Fract", icon: "📡", type: "rotary", dataKey: "nav1_stby", unit: "", decimals: 2, cmdDec: "NAV1_RADIO_FRACT_DEC", cmdInc: "NAV1_RADIO_FRACT_INC" },
            "rotary_com2_whole": { category: "Radios", name: "COM2 Whole", icon: "📻", type: "rotary", dataKey: "com2_stby", unit: "", decimals: 3, cmdDec: "COM2_RADIO_WHOLE_DEC", cmdInc: "COM2_RADIO_WHOLE_INC" },
            "rotary_com2_fract": { category: "Radios", name: "COM2 Fract", icon: "📻", type: "rotary", dataKey: "com2_stby", unit: "", decimals: 3, cmdDec: "COM2_RADIO_FRACT_DEC", cmdInc: "COM2_RADIO_FRACT_INC" },
            "rotary_nav2_whole": { category: "Radios", name: "NAV2 Whole", icon: "📡", type: "rotary", dataKey: "nav2_stby", unit: "", decimals: 2, cmdDec: "NAV2_RADIO_WHOLE_DEC", cmdInc: "NAV2_RADIO_WHOLE_INC" },
            "rotary_nav2_fract": { category: "Radios", name: "NAV2 Fract", icon: "📡", type: "rotary", dataKey: "nav2_stby", unit: "", decimals: 2, cmdDec: "NAV2_RADIO_FRACT_DEC", cmdInc: "NAV2_RADIO_FRACT_INC" }
        };

        let isEditMode = true;
        let selectedCellIndex = null;
        let draggedCellIndex = null; 
        let currentPage = 0;
        let currentFolderName = "";
        let pagesData = new Array(10).fill(null).map(() => new Array(24).fill(""));
        
        let currentProfile = "";
        let availableProfiles = [];
        let layoutListener = null;

        let globalActiveProfileRef, profileListRef, allLayoutsRef;

        function initializeSystem() {
            const firebaseConfig = {
                apiKey: "AIzaSyD7zsSlVfR" + "uTevKoU-2g3Xrkz5ZPLaILyQ",
                authDomain: "msfs-panel.firebaseapp.com",
                databaseURL: "https://msfs-panel-default-rtdb.firebaseio.com",
                projectId: "msfs-panel",
                storageBucket: "msfs-panel.firebasestorage.app",
                messagingSenderId: "622903655366",
                appId: "1:622903655366:web:12ca8db100f1c104b790c7",
                measurementId: "G-0VN39QBKR1"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const database = firebase.database();

            const userDbRef = database.ref('efb_users/' + USER_PIN);
            globalActiveProfileRef = userDbRef.child('active_profile');
            profileListRef = userDbRef.child('profile_list');
            allLayoutsRef = userDbRef.child('layouts');

            globalActiveProfileRef.on('value', (snap) => {
                let active = snap.val();
                if (!active) {
                    active = "Default";
                    globalActiveProfileRef.set(active);
                    profileListRef.child("Default").set(true);
                }
                if (currentProfile !== active) loadProfile(active);
            });

            profileListRef.on('value', (snap) => {
                if (snap.val()) {
                    availableProfiles = Object.keys(snap.val());
                    renderProfileList();
                }
            });

            connect();
        }

        // ==========================================
        // 2. PROFILE & DB LOGIC
        // ==========================================
        function loadProfile(profileName) {
            currentProfile = profileName;
            document.getElementById('ui-current-profile').innerText = profileName.toUpperCase();
            
            if (layoutListener) allLayoutsRef.child(currentProfile).off('value', layoutListener);
            
            currentPage = 0; currentFolderName = "";
            document.getElementById('breadcrumb').innerText = "HOME";

            layoutListener = allLayoutsRef.child(profileName).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && Array.isArray(data)) {
                    let safePages = new Array(10).fill(null).map(() => new Array(24).fill(""));
                    for (let p = 0; p < 10; p++) {
                        if (data[p]) {
                            Object.keys(data[p]).forEach(key => {
                                let index = parseInt(key);
                                if (!isNaN(index) && index >= 0 && index < 24) safePages[p][index] = data[p][key];
                            });
                        }
                    }
                    pagesData = safePages;
                } else {
                    pagesData = new Array(10).fill(null).map(() => new Array(24).fill(""));
                    saveLayout();
                }
                renderGrid();
            });
        }

        function saveLayout() {
            if (currentProfile) allLayoutsRef.child(currentProfile).set(pagesData);
        }

        function openProfileModal() { renderProfileList(); document.getElementById('profile-modal').style.display = 'flex'; }
        function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }
        
        function renderProfileList() {
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            
            availableProfiles.forEach(prof => {
                const item = document.createElement('div');
                item.className = `profile-item ${prof === currentProfile ? 'active' : ''}`;
                item.innerHTML = `<span>🛩️ ${prof}</span> ${prof === currentProfile ? '<span>(ACTIVE)</span>' : ''}`;
                item.onclick = () => { globalActiveProfileRef.set(prof); closeProfileModal(); };
                list.appendChild(item);
            });
        }

        function createNewProfile() {
            let newName = prompt("Enter a name for the new layout (e.g. Cessna 152):");
            if (newName && newName.trim() !== "") {
                let cleanName = newName.trim();
                profileListRef.child(cleanName).set(true);
                globalActiveProfileRef.set(cleanName);
                closeProfileModal();
            }
        }

        function changePage(pageIndex, folderName = "") {
            currentPage = pageIndex; currentFolderName = folderName;
            if (currentPage === 0) document.getElementById('breadcrumb').innerText = "HOME";
            else document.getElementById('breadcrumb').innerText = `HOME > ${currentFolderName}`;
            renderGrid();
        }

        // ==========================================
        // 3. UI RENDERING & DRAG/DROP
        // ==========================================
        function renderGrid() {
            const grid = document.getElementById('builder-grid');
            grid.innerHTML = '';
            let currentGridState = pagesData[currentPage];

            currentGridState.forEach((cellData, index) => {
                const cell = document.createElement('div');
                cell.id = `cell-${index}`;
                
                if (cellData && cellData.id) {
                    const dictItem = DICTIONARY[cellData.id];
                    if (!dictItem) return;

                    cell.className = `grid-cell filled type-${dictItem.type}`;
                    let valueId = `id="data-${index}"`;
                    let displayName = cellData.label || dictItem.name;

                    let innerHTML = `<div class="cell-icon">${dictItem.icon}</div><div class="cell-title">${displayName}</div>`;

                    if (dictItem.type === 'gauge') innerHTML += `<div class="cell-value" ${valueId}>---${dictItem.unit || ''}</div>`;
                    if (dictItem.type === 'rotary') {
                        innerHTML += `
                            <div class="rotary-container">
                                <button class="rotary-btn dec-btn">-</button>
                                <div class="cell-value" ${valueId}>---${dictItem.unit || ''}</div>
                                <button class="rotary-btn inc-btn">+</button>
                            </div>
                        `;
                    }
                    innerHTML += `<div class="delete-btn" onclick="clearCell(event, ${index})">✕</div>`;
                    cell.innerHTML = innerHTML;
                    
                    if (!isEditMode) {
                        cell.removeAttribute('draggable');
                        if (dictItem.type === 'button') cell.onclick = () => sendCommand(dictItem.command);
                        else if (dictItem.type === 'nav') cell.onclick = () => changePage(cellData.targetPage || 0, cellData.label || "");
                        else if (dictItem.type === 'rotary') {
                            cell.querySelector('.dec-btn').onclick = (e) => { e.stopPropagation(); sendCommand(dictItem.cmdDec); };
                            cell.querySelector('.inc-btn').onclick = (e) => { e.stopPropagation(); sendCommand(dictItem.cmdInc); };
                        }
                    } else {
                        cell.setAttribute('draggable', 'true');
                        cell.onclick = () => editCell(index);
                        cell.ondragstart = (e) => handleDragStart(e, index);
                        cell.ondragend = handleDragEnd;
                    }
                } else {
                    cell.className = 'grid-cell empty';
                    if (isEditMode) {
                        cell.innerHTML = `<div style="color: #333; font-size: 24px;">+</div>`;
                        cell.onclick = () => openModal(index);
                    }
                }

                if (isEditMode) {
                    cell.ondragover = handleDragOver;
                    cell.ondragenter = handleDragEnter;
                    cell.ondragleave = handleDragLeave;
                    cell.ondrop = (e) => handleDrop(e, index);
                }
                grid.appendChild(cell);
            });
        }

        function handleDragStart(e, index) { draggedCellIndex = index; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('drag-over')); draggedCellIndex = null; }
        function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; }
        function handleDragEnter(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function handleDrop(e, targetIndex) {
            e.stopPropagation(); e.currentTarget.classList.remove('drag-over');
            if (draggedCellIndex === null || draggedCellIndex === targetIndex) return;
            const temp = pagesData[currentPage][targetIndex];
            pagesData[currentPage][targetIndex] = pagesData[currentPage][draggedCellIndex];
            pagesData[currentPage][draggedCellIndex] = temp;
            saveLayout(); renderGrid();
        }

        function toggleMode() {
            isEditMode = !isEditMode;
            document.body.className = isEditMode ? 'edit-mode' : 'fly-mode';
            document.getElementById('btn-mode').innerHTML = isEditMode ? "✏️ EDIT MODE" : "🚀 FLY MODE";
            renderGrid();
        }

        // ==========================================
        // 4. COMPONENT MODAL LOGIC
        // ==========================================
        
        // THE UX FIX: Initialize state globally so it remembers your last selection!
        let currentModalCategory = "All";

        function openModal(index) {
            selectedCellIndex = index; 
            document.getElementById('modal-search').value = ""; 
            
            renderModalCategories(); 
            filterModal(); 
            document.getElementById('component-modal').style.display = 'flex';
        }

        function renderModalCategories() {
            const catContainer = document.getElementById('modal-categories');
            catContainer.innerHTML = '';
            let categories = new Set();
            for (const key in DICTIONARY) categories.add(DICTIONARY[key].category || "Other");
            
            let allBtn = document.createElement('button');
            allBtn.className = `cat-btn ${currentModalCategory === "All" ? "active" : ""}`;
            allBtn.innerText = "All Components";
            allBtn.onclick = () => { currentModalCategory = "All"; renderModalCategories(); filterModal(); };
            catContainer.appendChild(allBtn);

            Array.from(categories).sort().forEach(cat => {
                let btn = document.createElement('button');
                btn.className = `cat-btn ${currentModalCategory === cat ? "active" : ""}`;
                btn.innerText = cat;
                btn.onclick = () => { currentModalCategory = cat; renderModalCategories(); filterModal(); };
                catContainer.appendChild(btn);
            });
        }

        function filterModal() {
            const query = document.getElementById('modal-search').value.toLowerCase();
            const list = document.getElementById('component-list');
            list.innerHTML = '';

            for (const [id, data] of Object.entries(DICTIONARY)) {
                if (currentModalCategory !== "All" && data.category !== currentModalCategory) continue;
                if (query && !data.name.toLowerCase().includes(query) && !data.category.toLowerCase().includes(query)) continue;

                const item = document.createElement('div');
                item.className = 'component-item';
                
                let tagColor = 'var(--accent-green)'; 
                if (data.type === 'gauge') tagColor = 'var(--accent-blue)';
                if (data.type === 'rotary') tagColor = 'var(--accent-yellow)';
                if (data.type === 'nav') tagColor = 'var(--accent-purple)';

                item.innerHTML = `
                    <span style="font-size: 24px; min-width: 32px; text-align: center;">${data.icon}</span> 
                    <span style="font-size: 16px;">${data.name}</span>
                    <span class="component-tag" style="color: ${tagColor}">${data.type.toUpperCase()}</span>
                `;
                item.onclick = () => assignCell(id);
                list.appendChild(item);
            }
            if (list.innerHTML === '') list.innerHTML = `<div style="text-align:center; color: var(--text-muted); margin-top: 40px; font-weight: bold;">No components found.</div>`;
        }

        function closeModal() { document.getElementById('component-modal').style.display = 'none'; }

        function editCell(index) {
            const cellData = pagesData[currentPage][index];
            if (!cellData) return;

            if (cellData.id === "nav_folder" || cellData.id === "nav_back") {
                let currentName = cellData.label || DICTIONARY[cellData.id].name;
                let newLabel = prompt("Rename this button:", currentName);
                if (newLabel !== null && newLabel.trim() !== "") {
                    pagesData[currentPage][index].label = newLabel.trim();
                    saveLayout(); renderGrid();
                }
            } else {
                openModal(index);
            }
        }

        function assignCell(componentId) {
            if (selectedCellIndex === null) return;
            const dictItem = DICTIONARY[componentId];
            let label = ""; let targetPage = "";

            if (componentId === "nav_folder") {
                let promptedLabel = prompt("Enter Folder Name (e.g. LIGHTING):", "NEW FOLDER");
                if (!promptedLabel) return; 
                label = promptedLabel;

                let foundPage = -1;
                for (let i = 1; i < 10; i++) {
                    let isEmpty = pagesData[i].every(cell => cell === "" || cell === null);
                    if (isEmpty) { foundPage = i; break; }
                }
                if (foundPage === -1) { alert("Maximum folder limit (9 folders) reached!"); return; }
                
                targetPage = foundPage;
                pagesData[targetPage][0] = { id: "nav_back", label: "Back", targetPage: 0 };
            } else if (componentId === "nav_back") {
                targetPage = 0; label = "Back";
            } else if (dictItem.targetPage !== undefined) {
                targetPage = dictItem.targetPage;
            }

            pagesData[currentPage][selectedCellIndex] = { id: componentId, label: label, targetPage: targetPage };
            saveLayout(); closeModal(); renderGrid();
        }

        function clearCell(event, index) {
            event.stopPropagation(); 
            const cellData = pagesData[currentPage][index];
            if (cellData && cellData.id) {
                const dictItem = DICTIONARY[cellData.id];
                if (dictItem && cellData.id === "nav_folder" && cellData.targetPage) {
                    const confirmDelete = confirm(`Are you sure you want to delete the folder "${cellData.label}" and permanently erase all of the buttons inside it?`);
                    if (!confirmDelete) return; 
                    pagesData[cellData.targetPage] = new Array(24).fill("");
                }
            }
            pagesData[currentPage][index] = ""; 
            saveLayout(); renderGrid();
        }

        // ==========================================
        // 5. WEBSOCKET PIPELINE
        // ==========================================
        const statusText = document.getElementById('connection-status-text');
        const statusDot = document.getElementById('status-dot');
        let ws;

        function updateStatus(state) {
            statusDot.className = 'status-indicator'; 
            if (state === 'connected') {
                statusText.innerText = 'DATA LINK ESTABLISHED';
                statusDot.classList.add('connected');
            } else {
                statusText.innerText = 'DATA LINK LOST';
                statusDot.classList.add('disconnected');
            }
        }

        function connect() {
            ws = new WebSocket('wss://msfs-relay.onrender.com');
            
            ws.onopen = () => {
                updateStatus('connected');
                ws.send(JSON.stringify({ type: "join", pin: USER_PIN }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (!isEditMode) {
                        pagesData[currentPage].forEach((cellData, index) => {
                            if (cellData && cellData.id) {
                                const dictItem = DICTIONARY[cellData.id];
                                
                                if (dictItem && (dictItem.type === 'gauge' || dictItem.type === 'rotary')) {
                                    const simValue = data[dictItem.dataKey];
                                    if (simValue !== undefined && simValue !== null) {
                                        const valueDivs = document.querySelectorAll(`#data-${index}`);
                                        valueDivs.forEach(div => {
                                            let displayVal = dictItem.decimals !== undefined ? Number(simValue).toFixed(dictItem.decimals) : Math.round(simValue);
                                            div.innerText = displayVal + (dictItem.unit || '');
                                        });
                                    }
                                }
                                
                                if (dictItem && dictItem.type === 'button' && dictItem.stateKey) {
                                    const stateValue = data[dictItem.stateKey];
                                    if (stateValue !== undefined) {
                                        const cellEl = document.getElementById(`cell-${index}`);
                                        if (cellEl) {
                                            if (stateValue === 1 || stateValue === true) cellEl.classList.add('active');
                                            else cellEl.classList.remove('active');
                                        }
                                    }
                                }
                            }
                        });
                    }
                } catch (e) {}
            };
            ws.onclose = () => { updateStatus('disconnected'); setTimeout(connect, 3000); };
        }

        function sendCommand(cmd) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "SD_COMMAND", command: cmd }));
            }
        }
    </script>
</body>
