<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MSFS Panel Builder</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-base: #09090b; --bg-panel: #18181b; --border-panel: #27272a;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --accent-blue: #0ea5e9; --accent-green: #10b981;
            --accent-red: #ef4444; --accent-yellow: #f59e0b;
        }

        body {
            background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif;
            margin: 0; padding: 24px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-panel); }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-muted); }

        .controls-row { display: flex; gap: 12px; align-items: center; }
        
        .mode-toggle {
            background: #27272a; color: white; border: none; padding: 8px 16px; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .mode-toggle.edit-active { background: var(--accent-blue); }

        .status-indicator { width: 10px; height: 10px; border-radius: 50%; background-color: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); display: inline-block; margin-right: 8px;}
        .status-indicator.connected { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .status-indicator.disconnected { background-color: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }

        /* THE GRID */
        #builder-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 10px; flex-grow: 1; background: #000; padding: 16px; border-radius: 16px; 
            border: 2px solid var(--border-panel); box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
        }

        .grid-cell {
            background-color: #111; border-radius: 10px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: all 0.1s; position: relative; padding: 6px;
        }

        /* Edit Mode Styles */
        body.edit-mode .grid-cell { border: 2px dashed #333; cursor: pointer; }
        body.edit-mode .grid-cell:hover { border-color: var(--accent-blue); background-color: #1a1a2e; }
        body.edit-mode .grid-cell.filled { border: 2px solid var(--accent-blue); }
        
        /* Fly Mode Base Styles */
        body.fly-mode .grid-cell { border: 1px solid #333; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: border-color 0.1s, background-color 0.1s;}
        body.fly-mode .grid-cell.empty { opacity: 0; pointer-events: none; }
        
        /* BUTTON Fly Mode */
        body.fly-mode .grid-cell.type-button:active { transform: scale(0.92); box-shadow: 0 0 2px rgba(0,0,0,0.8); border-color: var(--accent-blue); }
        
        /* ACTIVE BUTTON STATE */
        body.fly-mode .grid-cell.type-button.active {
            border-color: var(--accent-green);
            background-color: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        body.fly-mode .grid-cell.type-button.active .cell-icon {
            filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.8));
        }
        
        /* GAUGE & ROTARY Fly Mode */
        body.fly-mode .grid-cell.type-gauge, body.fly-mode .grid-cell.type-rotary { 
            background-color: var(--bg-panel); border-top: 4px solid var(--accent-blue); justify-content: space-evenly;
        }

        .cell-icon { font-size: 24px; margin-bottom: 2px; transition: filter 0.2s;}
        .cell-title { font-size: 10px; font-weight: bold; text-align: center; padding: 0 4px; color: var(--text-muted); text-transform: uppercase;}
        
        .cell-value { font-family: 'Roboto Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text-main); display: none;}
        body.fly-mode .grid-cell.type-gauge .cell-value { display: block; }
        body.fly-mode .grid-cell.type-gauge .cell-icon { display: none; }

        /* ROTARY STYLES */
        .rotary-container { 
            display: none; width: 100%; justify-content: space-between; align-items: center; 
            background: #000; border-radius: 8px; padding: 2px 4px; box-sizing: border-box; margin-top: 4px;
        }
        body.fly-mode .grid-cell.type-rotary .rotary-container { display: flex; }
        body.fly-mode .grid-cell.type-rotary .cell-icon { display: none; }
        body.fly-mode .grid-cell.type-rotary .cell-value { display: block; font-size: 16px; color: var(--accent-blue); margin: 0;}
        
        .rotary-btn { 
            background: #333; color: white; border: none; border-radius: 6px; width: 28px; height: 28px; 
            font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .rotary-btn:active { background: var(--accent-blue); transform: scale(0.9); }

        .delete-btn { 
            position: absolute; top: -8px; right: -8px; background: var(--accent-red); color: white;
            border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; 
            justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid #000; z-index: 10;
        }
        body.edit-mode .grid-cell.filled .delete-btn { display: flex; }

        /* THE COMPONENT MODAL */
        #component-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: var(--bg-panel); padding: 24px; border-radius: 16px; width: 90%; max-width: 400px;
            border: 1px solid var(--border-panel);
        }
        .modal-title { margin-top: 0; font-size: 18px; color: var(--text-main); margin-bottom: 16px; }
        .component-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .component-item {
            background: #27272a; padding: 12px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; color: white; font-weight: bold; border: 1px solid transparent;
        }
        .component-item:active { border-color: var(--accent-blue); }
        .component-tag { font-size: 10px; background: #000; padding: 2px 6px; border-radius: 4px; color: var(--text-muted); margin-left: auto;}
        .cancel-btn { margin-top: 16px; width: 100%; padding: 12px; background: transparent; color: var(--text-muted); border: 1px solid #333; border-radius: 8px; cursor: pointer;}
    </style>
</head>
<body class="edit-mode">

    <div class="header">
        <div>
            <h1>PANEL BUILDER <span style="font-size: 12px; color: var(--accent-blue);">CLOUD SYNC</span></h1>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
                <div id="status-dot" class="status-indicator"></div>
                <span id="connection-status-text">CONNECTING</span>
            </div>
        </div>
        <div class="controls-row">
            <button id="btn-mode" class="mode-toggle edit-active" onclick="toggleMode()">✏️ EDIT MODE</button>
        </div>
    </div>

    <div id="builder-grid"></div>

    <div id="component-modal">
        <div class="modal-content">
            <h2 class="modal-title">Assign Control</h2>
            <div class="component-list" id="component-list"></div>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD7zsSlVfR" + "uTevKoU-2g3Xrkz5ZPLaILyQ",
            authDomain: "msfs-panel.firebaseapp.com",
            databaseURL: "https://msfs-panel-default-rtdb.firebaseio.com",
            projectId: "msfs-panel",
            storageBucket: "msfs-panel.firebasestorage.app",
            messagingSenderId: "622903655366",
            appId: "1:622903655366:web:12ca8db100f1c104b790c7",
            measurementId: "G-0VN39QBKR1"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const layoutRef = database.ref('efb_layout');


        // ==========================================
        // 2. THE MEGA DICTIONARY
        // ==========================================
        const DICTIONARY = {
            // --- FLIGHT CONTROLS ---
            "parking_brake": { name: "Parking Brake", icon: "🛑", type: "button", command: "PARKING_BRAKES", stateKey: "parking_brake_state" },
            "gear_toggle": { name: "Landing Gear", icon: "⚙️", type: "button", command: "GEAR_TOGGLE", stateKey: "gear_state" },
            "flaps_up": { name: "Flaps Up", icon: "🔼", type: "button", command: "FLAPS_DECR" },
            "flaps_down": { name: "Flaps Down", icon: "🔽", type: "button", command: "FLAPS_INCR" },
            
            // --- ELECTRICAL & SYSTEMS ---
            "batt_master": { name: "Battery", icon: "🔋", type: "button", command: "TOGGLE_MASTER_BATTERY", stateKey: "batt_state" },
            "alt_master": { name: "Alternator", icon: "⚡", type: "button", command: "TOGGLE_MASTER_ALTERNATOR", stateKey: "alt_state" },
            "pitot_heat": { name: "Pitot Heat", icon: "🔥", type: "button", command: "PITOT_HEAT_TOGGLE", stateKey: "pitot_state" },

            // --- LIGHTING ---
            "lights_nav": { name: "Nav Lights", icon: "🟢", type: "button", command: "TOGGLE_NAV_LIGHTS", stateKey: "nav_light_state" },
            "lights_beacon": { name: "Beacon", icon: "🚨", type: "button", command: "TOGGLE_BEACON_LIGHTS", stateKey: "beacon_state" },
            
            // THE FIX: MSFS uses "STROBES_TOGGLE", not "TOGGLE_STROBE_LIGHTS"
            "lights_strobe": { name: "Strobe", icon: "✨", type: "button", command: "STROBES_TOGGLE", stateKey: "strobe_state" },
            
            "lights_taxi": { name: "Taxi Lights", icon: "🚕", type: "button", command: "TOGGLE_TAXI_LIGHTS", stateKey: "taxi_state" },
            "lights_landing": { name: "Landing", icon: "🔦", type: "button", command: "LANDING_LIGHTS_TOGGLE", stateKey: "landing_state" },
            
            // --- AUTOPILOT MODES ---
            "ap_master": { name: "AP Master", icon: "✈️", type: "button", command: "AP_MASTER", stateKey: "ap_master_state" },
            "ap_fd": { name: "Flight Dir", icon: "📐", type: "button", command: "TOGGLE_FLIGHT_DIRECTOR", stateKey: "fd_state" },
            "ap_hdg_hold": { name: "HDG Hold", icon: "🎯", type: "button", command: "AP_PANEL_HEADING_HOLD", stateKey: "ap_hdg_state" },
            "ap_nav_hold": { name: "NAV Hold", icon: "🗺️", type: "button", command: "AP_NAV1_HOLD", stateKey: "ap_nav_state" },
            "ap_alt_hold": { name: "ALT Hold", icon: "⏫", type: "button", command: "AP_PANEL_ALTITUDE_HOLD", stateKey: "ap_alt_state" },
            "ap_vs_hold": { name: "VS Hold", icon: "📈", type: "button", command: "AP_PANEL_VS_HOLD", stateKey: "ap_vs_state" },
            "ap_apr_hold": { name: "Approach", icon: "🛬", type: "button", command: "AP_APR_HOLD", stateKey: "ap_apr_state" },
            
            // --- GAUGES ---
            "gauge_rpm": { name: "Engine RPM", icon: "⏱️", type: "gauge", dataKey: "rpm", unit: "" },
            "gauge_flaps": { name: "Flaps %", icon: "📐", type: "gauge", dataKey: "flaps_pct", unit: "%" },
            "gauge_fuel": { name: "Fuel Qty", icon: "⛽", type: "gauge", dataKey: "fuel_pct", unit: " Gal" },
            "gauge_alt": { name: "Altitude", icon: "⛰️", type: "gauge", dataKey: "altitude", unit: " FT" },
            "gauge_spd": { name: "Airspeed", icon: "💨", type: "gauge", dataKey: "airspeed", unit: " KTS" },
            "gauge_vs": { name: "Vert Speed", icon: "↕️", type: "gauge", dataKey: "vs", unit: " FPM" },
            "gauge_oat": { name: "Outside Temp", icon: "🌡️", type: "gauge", dataKey: "oat", unit: "°C" },

            // --- ROTARIES ---
            "rotary_hdg": { name: "AP Heading", icon: "🧭", type: "rotary", dataKey: "ap_hdg", unit: "°", cmdDec: "HEADING_BUG_DEC", cmdInc: "HEADING_BUG_INC" },
            "rotary_alt": { name: "AP Altitude", icon: "↕️", type: "rotary", dataKey: "ap_alt", unit: " FT", cmdDec: "AP_ALT_VAR_DEC", cmdInc: "AP_ALT_VAR_INC" },
            "rotary_vs": { name: "AP Vert Spd", icon: "📈", type: "rotary", dataKey: "ap_vs", unit: " FPM", cmdDec: "AP_VS_VAR_DEC", cmdInc: "AP_VS_VAR_INC" },
            "rotary_baro": { name: "Barometer", icon: "☁️", type: "rotary", dataKey: "baro", unit: " hPa", cmdDec: "KOHLSMAN_DEC", cmdInc: "KOHLSMAN_INC" }
        };

        // ==========================================
        // 3. CLOUD STATE MANAGEMENT
        // ==========================================
        let isEditMode = true;
        let selectedCellIndex = null;
        let gridState = new Array(24).fill(""); 

        layoutRef.on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                let safeArray = new Array(24).fill("");
                Object.keys(data).forEach(key => {
                    let index = parseInt(key);
                    if (!isNaN(index) && index >= 0 && index < 24) {
                        safeArray[index] = data[key];
                    }
                });
                gridState = safeArray;
            } else {
                saveLayout();
            }
            renderGrid();
        }, (error) => {
            console.error("FIREBASE ERROR:", error);
            document.getElementById('connection-status-text').innerText = "CLOUD DB ERROR";
            document.getElementById('status-dot').className = 'status-indicator disconnected';
            renderGrid(); 
        });

        function saveLayout() {
            layoutRef.set(gridState);
        }

        // ==========================================
        // 4. UI RENDERING & LOGIC
        // ==========================================
        function renderGrid() {
            const grid = document.getElementById('builder-grid');
            grid.innerHTML = '';

            gridState.forEach((cellData, index) => {
                const cell = document.createElement('div');
                cell.id = `cell-${index}`;
                
                if (cellData && cellData.id) {
                    const dictItem = DICTIONARY[cellData.id];
                    if (!dictItem) return;

                    cell.className = `grid-cell filled type-${dictItem.type}`;
                    let valueId = (dictItem.type === 'gauge' || dictItem.type === 'rotary') ? `id="gauge-${index}"` : '';

                    let innerHTML = `
                        <div class="cell-icon">${dictItem.icon}</div>
                        <div class="cell-title">${dictItem.name}</div>
                        <div class="cell-value" ${valueId}>---${dictItem.unit || ''}</div>
                    `;

                    if (dictItem.type === 'rotary') {
                        innerHTML += `
                            <div class="rotary-container">
                                <button class="rotary-btn dec-btn">-</button>
                                <div class="cell-value" ${valueId}>---${dictItem.unit || ''}</div>
                                <button class="rotary-btn inc-btn">+</button>
                            </div>
                        `;
                    }

                    innerHTML += `<div class="delete-btn" onclick="clearCell(event, ${index})">✕</div>`;
                    cell.innerHTML = innerHTML;
                    
                    if (!isEditMode) {
                        if (dictItem.type === 'button') {
                            cell.onclick = () => sendCommand(dictItem.command);
                        } else if (dictItem.type === 'rotary') {
                            cell.querySelector('.dec-btn').onclick = (e) => { e.stopPropagation(); sendCommand(dictItem.cmdDec); };
                            cell.querySelector('.inc-btn').onclick = (e) => { e.stopPropagation(); sendCommand(dictItem.cmdInc); };
                        }
                    }
                } else {
                    cell.className = 'grid-cell empty';
                    if (isEditMode) {
                        cell.innerHTML = `<div style="color: #333; font-size: 24px;">+</div>`;
                        cell.onclick = () => openModal(index);
                    }
                }
                
                grid.appendChild(cell);
            });
        }

        function toggleMode() {
            isEditMode = !isEditMode;
            document.body.className = isEditMode ? 'edit-mode' : 'fly-mode';
            
            const btn = document.getElementById('btn-mode');
            if (isEditMode) {
                btn.innerHTML = "✏️ EDIT MODE";
                btn.classList.add('edit-active');
            } else {
                btn.innerHTML = "🚀 FLY MODE";
                btn.classList.remove('edit-active');
            }
            renderGrid();
        }

        function openModal(index) {
            selectedCellIndex = index;
            const list = document.getElementById('component-list');
            list.innerHTML = '';

            for (const [id, data] of Object.entries(DICTIONARY)) {
                const item = document.createElement('div');
                item.className = 'component-item';
                
                let tagColor = 'var(--accent-green)'; 
                if (data.type === 'gauge') tagColor = 'var(--accent-blue)';
                if (data.type === 'rotary') tagColor = 'var(--accent-yellow)';

                item.innerHTML = `
                    <span style="font-size: 20px;">${data.icon}</span> 
                    <span>${data.name}</span>
                    <span class="component-tag" style="color: ${tagColor}">${data.type.toUpperCase()}</span>
                `;
                item.onclick = () => assignCell(id);
                list.appendChild(item);
            }
            document.getElementById('component-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('component-modal').style.display = 'none';
            selectedCellIndex = null;
        }

        function assignCell(componentId) {
            if (selectedCellIndex !== null) {
                gridState[selectedCellIndex] = { id: componentId };
                saveLayout(); 
                closeModal();
            }
        }

        function clearCell(event, index) {
            event.stopPropagation(); 
            gridState[index] = ""; 
            saveLayout(); 
        }

        // ==========================================
        // 5. MSFS RENDER PIPELINE
        // ==========================================
        const statusText = document.getElementById('connection-status-text');
        const statusDot = document.getElementById('status-dot');
        let ws;

        function updateStatus(state) {
            statusDot.className = 'status-indicator'; 
            if (state === 'connected') {
                statusText.innerText = 'DATA LINK ESTABLISHED';
                statusDot.classList.add('connected');
            } else {
                statusText.innerText = 'DATA LINK LOST';
                statusDot.classList.add('disconnected');
            }
        }

        function connect() {
            ws = new WebSocket('wss://msfs-relay.onrender.com');
            ws.onopen = () => updateStatus('connected');
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (!isEditMode) {
                        gridState.forEach((cellData, index) => {
                            if (cellData && cellData.id) {
                                const dictItem = DICTIONARY[cellData.id];
                                
                                if (dictItem && (dictItem.type === 'gauge' || dictItem.type === 'rotary')) {
                                    const simValue = data[dictItem.dataKey];
                                    if (simValue !== undefined) {
                                        const valueDivs = document.querySelectorAll(`#gauge-${index}`);
                                        valueDivs.forEach(div => {
                                            div.innerText = Math.round(simValue) + (dictItem.unit || '');
                                        });
                                    }
                                }
                                
                                if (dictItem && dictItem.type === 'button' && dictItem.stateKey) {
                                    const stateValue = data[dictItem.stateKey];
                                    if (stateValue !== undefined) {
                                        const cellEl = document.getElementById(`cell-${index}`);
                                        if (cellEl) {
                                            if (stateValue === 1 || stateValue === true) {
                                                cellEl.classList.add('active');
                                            } else {
                                                cellEl.classList.remove('active');
                                            }
                                        }
                                    }
                                }
                            }
                        });
                    }
                } catch (e) {}
            };
            
            ws.onclose = () => {
                updateStatus('disconnected');
                setTimeout(connect, 3000);
            };
        }

        function sendCommand(cmd) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "SD_COMMAND", command: cmd }));
            }
        }

        connect();
    </script>
</body>
</html>
